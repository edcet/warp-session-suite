apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-automation
  namespace: unified-automation
spec:
  replicas: 3
  selector:
    matchLabels:
      app: unified-automation
  template:
    metadata:
      labels:
        app: unified-automation
    spec:
      containers:
      - env:
        - name: MISE_EXPERIMENTAL
          value: '1'
        - name: PLUGIN_DIR
          value: /app/plugins
        image: unified-terminal-automation:latest
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        name: app
        ports:
        - containerPort: 8080
        - containerPort: 8443
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi
