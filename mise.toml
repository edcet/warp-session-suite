#===============================================================================
# UNIFIED MODULAR TERMINAL AUTOMATION SYSTEM
# Version: 6.0.0 (Warp-Session-Suite Integration)
# GitOps-Driven, AI-Augmented, Multi-Tool Orchestration Platform
#===============================================================================

[settings]
experimental = true
jobs = 0  # Auto-detect CPU cores
verbose = false
legacy_version_file = true
asdf_compat = true
yes = true
always_keep_download = false
always_keep_install = false

#===============================================================================
# UNIVERSAL TOOLCHAIN - Version Pinned for Reproducibility
#===============================================================================
[tools]
# Core Languages & Runtimes
node = "22.2.0"
python = "3.12.4"
rust = "1.78.0"
go = "1.22.3"
bun = "1.1.10"

# Python Ecosystem (UV-first)
uv = "0.2.7"
pdm = "2.15.1"
ruff = "0.4.5"
poetry = "1.8.2"

# AI & Terminal Multiplexer
tgpt = { git = "https://github.com/aandrew-me/tgpt.git", ref = "main" }
zellij = "0.40.1"

# Essential CLI Utilities (Rust-first)
fzf = "0.52.1"
bat = "0.24.0"
eza = "0.18.15"
fd = "10.1.0"
ripgrep = "14.1.0"
delta = "0.17.0"
zoxide = "0.9.4"
gum = "0.14.1"
glow = "1.5.1"
gh = "2.50.0"
starship = "1.18.2"
btop = "1.3.2"
lazygit = "0.42.0"
k9s = "0.32.4"
shellcheck = "0.10.0"
shfmt = "3.8.0"
jq = "1.7.1"
yq = "4.44.1"

#===============================================================================
# GLOBAL ENVIRONMENT - XDG Compliant & Performance Optimized
#===============================================================================
[env]
# XDG Base Directory Specification
XDG_CONFIG_HOME = "${HOME}/.config"
XDG_DATA_HOME = "${HOME}/.local/share"
XDG_CACHE_HOME = "${HOME}/.cache"
XDG_STATE_HOME = "${HOME}/.local/state"

# Core System Environment
LANG = "en_US.UTF-8"
LC_ALL = "en_US.UTF-8"
TERM = "xterm-256color"
COLORTERM = "truecolor"
EDITOR = "hx"
VISUAL = "${EDITOR}"
PAGER = "less -R"
SHELL = "/bin/zsh"

# Terminal Automation System Paths
UNIFIED_AUTOMATION_HOME = "${PWD}"
WARP_SESSION_SUITE_HOME = "${PWD}"
PLUGIN_DIR = "${PWD}/plugins"
CONFIG_REPO_PATH = "${PWD}"

# Python Environment (UV-optimized)
PYTHONDONTWRITEBYTECODE = "1"
PYTHONUNBUFFERED = "1"
PYTHONDEVMODE = "1"
UV_CACHE_DIR = "${XDG_CACHE_HOME}/uv"
UV_NATIVE_DEPS = "1"
PDM_CACHE_DIR = "${XDG_CACHE_HOME}/pdm"
PDM_VENV_IN_PROJECT = "true"
RUFF_CACHE_DIR = "${XDG_CACHE_HOME}/ruff"

# Rust Environment
CARGO_HOME = "${HOME}/.cargo"
RUSTUP_HOME = "${HOME}/.rustup"
RUST_BACKTRACE = "1"
CARGO_TERM_COLOR = "always"

# AI Integration
TGPT_CONFIG_HOME = "${XDG_CONFIG_HOME}/tgpt"
UNIFIED_AI_CACHE = "${XDG_CACHE_HOME}/unified_ai"

# FZF Configuration
FZF_DEFAULT_COMMAND = "fd --type f --hidden --follow --exclude .git --exclude node_modules --exclude target --exclude .venv"
FZF_DEFAULT_OPTS = "--height 60% --layout=reverse --border --ansi --cycle --bind 'ctrl-/:toggle-preview' --color=dark --prompt=' ' --pointer='➤' --marker='✓'"
FZF_PREVIEW_FILE_CMD = "bat --color=always --style=numbers,changes --line-range :200 {}"

# Performance Optimizations
NUMBER_OF_PROCESSORS = "$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)"
MAKEFLAGS = "-j${NUMBER_OF_PROCESSORS}"

#===============================================================================
# UNIFIED TERMINAL AUTOMATION TASKS
#===============================================================================
[tasks]

#-------------------------------------------------------------------------------
# System Bootstrap & GitOps Management
#-------------------------------------------------------------------------------
[tasks."system:bootstrap"]
description = "Complete system bootstrap: tools, plugins, dotfiles, and GitOps setup"
aliases = ["bootstrap", "init"]
run = """#!/usr/bin/env bash
set -euo pipefail

echo "🚀 Bootstrapping Unified Terminal Automation System"

# Install all mise-managed tools
echo "📦 Installing mise tools..."
mise install --all

# Initialize plugin system
echo "🔌 Initializing plugin architecture..."
mkdir -p plugins/{warp,cursor,windsurf,pearai,trae}/src
mkdir -p plugins/core/{session,token,state}
mkdir -p plugins/ai/{tgpt,openai,anthropic}

# Create plugin registry
cat > plugins/registry.json << 'EOF'
{
  "plugins": {
    "warp": {
      "name": "Warp Terminal Integration",
      "version": "1.0.0",
      "entry": "plugins/warp/src/main.py",
      "capabilities": ["session_recovery", "database_access", "ai_integration"]
    },
    "cursor": {
      "name": "Cursor AI Editor Integration", 
      "version": "1.0.0",
      "entry": "plugins/cursor/src/main.py",
      "capabilities": ["token_management", "auth_bypass", "session_persistence"]
    },
    "windsurf": {
      "name": "Windsurf Integration",
      "version": "1.0.0", 
      "entry": "plugins/windsurf/src/main.py",
      "capabilities": ["context_routing", "command_enhancement"]
    },
    "core": {
      "name": "Core Session Management",
      "version": "1.0.0",
      "entry": "plugins/core/session/manager.py",
      "capabilities": ["unified_session", "cross_tool_state", "backup_restore"]
    },
    "ai": {
      "name": "AI Integration Hub",
      "version": "1.0.0",
      "entry": "plugins/ai/tgpt/integration.py", 
      "capabilities": ["code_generation", "analysis", "automation"]
    }
  }
}
EOF

echo "✅ System bootstrap complete!"
echo "Next: Run 'mise run plugin:create-warp' to migrate existing Warp functionality"
"""

[tasks."gitops:sync"]
description = "GitOps configuration synchronization"
aliases = ["sync", "cfg:sync"]
run = """#!/usr/bin/env bash
set -euo pipefail

if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
    echo "⚠️ Not in a Git repository. Initializing..."
    git init -b main
    git add .
    git commit -m "feat: Initialize Unified Terminal Automation System"
fi

echo "🔄 Syncing GitOps configuration..."

# Stage all configuration changes
git add mise.toml plugins/ warp_session_recovery.py warp_queries/

# Check for changes
if ! git diff --quiet --cached; then
    TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")
    git commit -m "feat(gitops): Configuration sync - $TIMESTAMP"
    echo "✅ Configuration committed locally"
    
    if command -v gum &>/dev/null; then
        if gum confirm "Push changes to remote?"; then
            git push || echo "⚠️ Push failed - resolve manually"
        fi
    else
        echo "📤 Ready to push: git push"
    fi
else
    echo "✅ Configuration already up-to-date"
fi
"""

#-------------------------------------------------------------------------------
# Plugin System Management
#-------------------------------------------------------------------------------
[tasks."plugin:create-warp"]
description = "Create Warp plugin with existing session recovery functionality"
run = """#!/usr/bin/env bash
set -euo pipefail

echo "🔌 Creating Warp plugin from existing functionality..."

# Create plugin structure
mkdir -p plugins/warp/{src,config,tests}

# Create main Warp plugin
cat > plugins/warp/src/main.py << 'EOF'
#!/usr/bin/env python3
"""
Warp Terminal Plugin for Unified Terminal Automation System
Migrated and enhanced from existing warp_session_recovery.py
"""

import json
import os
import sqlite3
import sys
from pathlib import Path
from typing import Optional, Dict, List, Any
from datetime import datetime

class WarpPlugin:
    """Warp Terminal integration plugin with enhanced session recovery."""
    
    def __init__(self, config: Dict[str, Any] = None):
        self.name = "warp"
        self.version = "1.0.0"
        self.config = config or {}
        self.db_path = self._find_warp_database()
        
    def _find_warp_database(self) -> Path:
        """Find Warp's SQLite database with enhanced security."""
        paths = [
            "~/Library/Application Support/dev.warp.Warp-Stable/warp.sqlite",
            "~/Library/Application Support/dev.warp.Warp/warp.sqlite",
            "~/Library/Application Support/dev.warp.Warp/stores/main.sqlite",
            "~/Library/Application Support/Warp/warp.sqlite",
        ]
        
        for path_str in paths:
            path = Path(path_str).expanduser().resolve()
            if path.exists():
                # Security validation
                if '..' in str(path):
                    raise ValueError("Path traversal detected in Warp database path")
                return path
        
        # Fallback to test database
        test_db = Path("test_data/warp_test.sqlite")
        if test_db.exists():
            return test_db
            
        raise FileNotFoundError("Warp database not found")
    
    def initialize(self) -> bool:
        """Initialize Warp plugin."""
        try:
            self.conn = sqlite3.connect(f"file:{self.db_path}?mode=ro", uri=True)
            self.conn.row_factory = sqlite3.Row
            return True
        except Exception as e:
            print(f"Failed to initialize Warp plugin: {e}")
            return False
    
    def get_session_state(self, hours: int = 24) -> Dict[str, Any]:
        """Extract comprehensive session state with security hardening."""
        return self._get_session_data_secure(hours)
    
    def _get_session_data_secure(self, hours: int) -> Dict[str, Any]:
        """Secure session data extraction using parameterized queries."""
        # Recent commands with full context (SECURITY: Parameterized query)
        commands = self._execute_query("""
            SELECT 
                c.id, c.command, c.pwd as working_directory,
                c.git_branch, c.exit_code,
                datetime(c.start_ts) as started_at,
                datetime(c.completed_ts) as completed_at,
                c.shell, c.username, c.hostname, c.session_id
            FROM commands c 
            WHERE c.start_ts > datetime('now', ? || ' hours')
            ORDER BY c.start_ts DESC
        """, (f"-{hours}",))
        
        # AI conversations (SECURITY: Parameterized query)
        ai_conversations = self._execute_query("""
            SELECT 
                aq.id, aq.exchange_id, aq.conversation_id,
                datetime(aq.start_ts) as started_at,
                aq.input, aq.working_directory, aq.model_id,
                aq.output_status, ab.output as ai_response
            FROM ai_queries aq
            LEFT JOIN ai_blocks ab ON ab.exchange_id = aq.exchange_id
            WHERE aq.start_ts > datetime('now', ? || ' hours')
            ORDER BY aq.start_ts DESC
        """, (f"-{hours}",))
        
        return {
            'plugin': 'warp',
            'version': self.version,
            'extraction_time': datetime.now().isoformat(),
            'database_path': str(self.db_path),
            'time_range_hours': hours,
            'commands': commands,
            'ai_conversations': ai_conversations,
            'stats': {
                'total_commands': len(commands),
                'total_ai_conversations': len(ai_conversations)
            }
        }
    
    def _execute_query(self, sql: str, params: tuple = ()) -> List[Dict]:
        """Execute query with security hardening."""
        cursor = self.conn.execute(sql, params)
        columns = [desc[0] for desc in cursor.description]
        return [dict(zip(columns, row)) for row in cursor.fetchall()]
    
    def create_recovery_script(self, session_data: Dict, output_name: str = "warp_recovery.sh") -> str:
        """Generate recovery script with secure file handling."""
        # SECURITY: Secure file path to prevent path traversal
        safe_output = os.path.join(os.getcwd(), os.path.basename(output_name))
        
        script_lines = [
            "#!/bin/bash",
            "# Warp Session Recovery Script (Generated by Unified Automation System)",
            f"# Generated: {session_data.get('extraction_time', 'unknown')}",
            "",
            "echo '🚀 Warp session recovery via Unified Terminal Automation System'",
            ""
        ]
        
        # Add recent commands context
        for cmd in session_data.get('commands', [])[:10]:
            if cmd.get('working_directory'):
                script_lines.append(f"# {cmd['started_at']} in {cmd['working_directory']}")
            script_lines.append(f"# {cmd['command']}")
            if cmd.get('exit_code', 0) != 0:
                script_lines.append(f"# ❌ Exit code: {cmd['exit_code']}")
            script_lines.append("")
        
        with open(safe_output, 'w') as f:
            f.write('\n'.join(script_lines))
        
        Path(safe_output).chmod(0o755)
        return safe_output

# Plugin factory function
def create_plugin(config: Dict[str, Any] = None) -> WarpPlugin:
    return WarpPlugin(config)
EOF

echo "✅ Warp plugin created successfully!"
echo "📍 Location: plugins/warp/"
echo "🔧 Next: Run 'mise run plugin:test-warp' to test the plugin"
"""

[tasks."plugin:test-warp"]
