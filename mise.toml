#-------------------------------------------------------------------------------
# AI-Powered Automation (TGPT Integration)
#-------------------------------------------------------------------------------
[tasks."ai:generate-plugin"]
description = "Use TGPT to generate a new tool plugin interactively"
run = """#!/usr/bin/env bash
set -euo pipefail

if ! command -v tgpt &>/dev/null; then
    echo "❌ TGPT not found. Install via 'mise use -g tgpt'"
    exit 1
fi

echo "🤖 AI-Powered Plugin Generator"

# Interactive plugin specification
if command -v gum &>/dev/null; then
    TOOL_NAME=$(gum input --placeholder "Tool name (e.g., cursor, windsurf, pearai)")
    TOOL_DESC=$(gum input --placeholder "Tool description (e.g., 'AI code editor with token management')")
    CAPABILITIES=$(gum input --placeholder "Capabilities (comma-separated, e.g., 'auth_bypass,session_persistence,ai_integration')")
else
    echo -n "Tool name: "; read TOOL_NAME
    echo -n "Tool description: "; read TOOL_DESC
    echo -n "Capabilities: "; read CAPABILITIES
fi

echo "🧠 Generating plugin with TGPT..."

PLUGIN_PROMPT="Generate a Python plugin for the tool '$TOOL_NAME' which is '$TOOL_DESC'. 
The plugin should:
1. Follow the same pattern as the Warp plugin
2. Implement initialize(), get_session_state(), and create_recovery_script() methods
3. Handle these capabilities: $CAPABILITIES
4. Include secure database/file operations with parameterized queries
5. Include proper error handling and logging

Generate the complete plugin code for plugins/$TOOL_NAME/src/main.py"

GENERATED_PLUGIN=$(tgpt --code "$PLUGIN_PROMPT")

# Create plugin structure
mkdir -p "plugins/$TOOL_NAME"/{src,config,tests}

# Extract and save the generated code
echo "$GENERATED_PLUGIN" | sed '/^```python/,/^```/!d; /^```/d' > "plugins/$TOOL_NAME/src/main.py"

# Create plugin config
cat > "plugins/$TOOL_NAME/config/settings.json" << EOF
{
  "name": "$TOOL_NAME",
  "description": "$TOOL_DESC", 
  "capabilities": [$(echo "$CAPABILITIES" | sed 's/,/", "/g' | sed 's/^/"/' | sed 's/$/"/')],
  "version": "1.0.0"
}
EOF

# Update plugin registry
python3 -c "
import json
with open('plugins/registry.json', 'r') as f: registry = json.load(f)
registry['plugins']['$TOOL_NAME'] = {
    'name': '$TOOL_DESC',
    'version': '1.0.0', 
    'entry': 'plugins/$TOOL_NAME/src/main.py',
    'capabilities': [c.strip() for c in '$CAPABILITIES'.split(',')]
}
with open('plugins/registry.json', 'w') as f: json.dump(registry, f, indent=2)
"

echo "✅ Plugin '$TOOL_NAME' generated successfully!"
echo "📍 Location: plugins/$TOOL_NAME/"
echo "🔧 Test with: python3 plugins/$TOOL_NAME/src/main.py"
"""

[tasks."ai:code-review"]
description = "AI-powered code review using TGPT"
run = """#!/usr/bin/env bash
set -euo pipefail

if ! command -v tgpt &>/dev/null; then
    echo "❌ TGPT not found"
    exit 1
fi

# Determine what to review
if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
    echo "📊 Analyzing Git changes for AI code review..."
    
    # Get changed files
    CHANGED_FILES=$(git diff --name-only HEAD~1 2>/dev/null || git diff --name-only --cached)
    
    if [ -z "$CHANGED_FILES" ]; then
        echo "⚠️ No changes detected"
        exit 0
    fi
    
    echo "📁 Changed files: $CHANGED_FILES"
    
    # Generate diff for review
    DIFF_CONTENT=$(git diff HEAD~1 2>/dev/null || git diff --cached)
    
    echo "🧠 Analyzing changes with AI..."
    
    REVIEW_PROMPT="Perform a comprehensive code review of the following changes:

$DIFF_CONTENT

Focus on:
1. Security vulnerabilities (SQL injection, path traversal, etc.)
2. Code quality and best practices
3. Performance considerations
4. Maintainability and readability
5. Error handling
6. Testing considerations

Provide specific, actionable feedback with line references where possible."

    REVIEW_OUTPUT=$(tgpt --markdown "$REVIEW_PROMPT")
    
    # Save review to file
    REVIEW_FILE="ai_code_review_$(date +%Y%m%d_%H%M%S).md"
    echo "$REVIEW_OUTPUT" > "$REVIEW_FILE"
    
    echo "✅ AI code review completed!"
    echo "📄 Review saved to: $REVIEW_FILE"
    
    # Display review
    if command -v glow &>/dev/null; then
        glow "$REVIEW_FILE"
    else
        cat "$REVIEW_FILE"
    fi
    
else
    echo "❌ Not in a Git repository"
    exit 1
fi
"""

