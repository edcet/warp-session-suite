[tasks."cli:unified"]
description = "Launch the unified CLI interface with all tools integrated"
aliases = ["cli", "ui"]
run = """#!/usr/bin/env python3
import os
import sys
import json
import subprocess
from pathlib import Path

def load_plugin_registry():
    \"\"\"Load available plugins from registry.\"\"\"
    registry_path = Path("plugins/registry.json")
    if registry_path.exists():
        with open(registry_path) as f:
            return json.load(f)
    return {"plugins": {}}

def main():
    \"\"\"Unified CLI interface.\"\"\"
    print("🚀 Unified Terminal Automation System")
    print("═" * 50)
    
    registry = load_plugin_registry()
    
    if len(sys.argv) < 2:
        print("Available commands:")
        print("  warp           - Warp session recovery and management")
        print("  cursor         - Cursor AI editor automation")
        print("  windsurf       - Windsurf integration")
        print("  plugins        - Plugin management")
        print("  ai             - AI-powered automation")
        print("  system         - System management")
        print("")
        print(f"Available plugins: {', '.join(registry['plugins'].keys())}")
        print("")
        print("Usage: mise run cli:unified <command> [args...]")
        return
    
    command = sys.argv[1]
    args = sys.argv[2:]
    
    # Route commands to appropriate handlers
    if command == "warp":
        handle_warp_command(args)
    elif command == "cursor":
        handle_cursor_command(args)
    elif command == "plugins":
        handle_plugin_command(args)
    elif command == "ai":
        handle_ai_command(args)
    elif command == "system":
        handle_system_command(args)
    else:
        print(f"❌ Unknown command: {command}")
        sys.exit(1)

def handle_warp_command(args):
    \"\"\"Handle Warp-specific commands.\"\"\"
    if not args or args[0] == "help":
        print("Warp commands:")
        print("  recover [hours]  - Extract and create recovery script")
        print("  export           - Export to Obsidian format")
        print("  backup          - Create session backup")
        return
    
    if args[0] == "recover":
        hours = int(args[1]) if len(args) > 1 else 24
        print(f"🔄 Running Warp session recovery for last {hours} hours...")
        subprocess.run([sys.executable, "warp_session_recovery.py"])

def handle_cursor_command(args):
    \"\"\"Handle Cursor-specific commands.\"\"\"
    print("🎯 Cursor integration coming soon...")
    print("Planned features: token management, auth bypass, session persistence")

def handle_plugin_command(args):
    \"\"\"Handle plugin management commands.\"\"\"
    if not args:
        registry = load_plugin_registry()
        print("📦 Installed plugins:")
        for name, info in registry["plugins"].items():
            status = "✅" if Path(info["entry"]).exists() else "❌"
            print(f"  {status} {name} - {info.get('name', 'No description')}")
        return
    
    if args[0] == "create":
        subprocess.run(["mise", "run", "ai:generate-plugin"])

def handle_ai_command(args):
    \"\"\"Handle AI-powered automation commands.\"\"\"
    if not args:
        print("🤖 AI commands:")
        print("  generate-plugin  - Create new plugin with AI")
        print("  code-review     - AI code review")
        print("  chat [query]    - Interactive AI chat")
        return
    
    if args[0] == "generate-plugin":
        subprocess.run(["mise", "run", "ai:generate-plugin"])
    elif args[0] == "code-review":
        subprocess.run(["mise", "run", "ai:code-review"])
    elif args[0] == "chat":
        query = " ".join(args[1:]) if len(args) > 1 else ""
        if query:
            subprocess.run(["tgpt", query])
        else:
            subprocess.run(["tgpt"])

def handle_system_command(args):
    \"\"\"Handle system management commands.\"\"\"
    if not args:
        print("⚙️ System commands:")
        print("  status      - System health check")
        print("  bootstrap   - Initialize system")
        print("  sync        - GitOps sync")
        return
    
    if args[0] == "status":
        subprocess.run(["mise", "run", "system:health-check"])
    elif args[0] == "bootstrap":
        subprocess.run(["mise", "run", "system:bootstrap"])
    elif args[0] == "sync":
        subprocess.run(["mise", "run", "gitops:sync"])

if __name__ == "__main__":
    main()
"""

#-------------------------------------------------------------------------------
# Development Workflow Automation
#-------------------------------------------------------------------------------
[tasks."dev:setup"]
description = "Intelligent project setup based on detected type"
run = """#!/usr/bin/env bash
set -euo pipefail

echo "🔍 Detecting project type..."

# Enhanced project detection
detect_project_type() {
    if [ -f "mise.toml" ] && grep -q "unified.*automation" mise.toml; then
        echo "unified-automation"
    elif [ -f "warp_session_recovery.py" ]; then
        echo "warp-session-suite"
    elif [ -f "pyproject.toml" ] && grep -q "\\[tool.pdm\\]" pyproject.toml; then
        echo "python-pdm"
    elif [ -f "Cargo.toml" ]; then
        echo "rust"
    else
        echo "generic"
    fi
}

PROJECT_TYPE=$(detect_project_type)
echo "📋 Detected project type: $PROJECT_TYPE"

case "$PROJECT_TYPE" in
    "unified-automation")
        echo "🚀 Setting up Unified Terminal Automation System..."
        mise run system:bootstrap
        ;;
    "warp-session-suite")
        echo "🔧 Setting up Warp Session Suite..."
        if [ ! -d "test_data" ]; then
            mkdir -p test_data
            echo "📊 Created test_data directory"
        fi
        python3 -m pip install --user pandas sqlite-utils || echo "⚠️ Optional dependencies not installed"
        ;;
    "python-pdm")
        echo "🐍 Setting up Python PDM project..."
        pdm install
        ;;
    "rust")
        echo "🦀 Setting up Rust project..."
        cargo fetch
        ;;
    *)
        echo "📦 Generic project setup..."
        if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
        elif [ -f "package.json" ]; then
            npm install
        fi
        ;;
esac

echo "✅ Project setup complete!"
"""

[tasks."system:health-check"]
description = "Comprehensive system health check with auto-healing"
run = """#!/usr/bin/env bash
set -euo pipefail

echo "🏥 System Health Check"
echo "====================="

ISSUES_FOUND=0

# Check mise tools
echo "📦 Checking mise tools..."
if mise doctor >/dev/null 2>&1; then
    echo "✅ Mise tools healthy"
else
    echo "❌ Mise tools issues detected"
    ISSUES_FOUND=$((ISSUES_FOUND + 1))
fi

# Check plugin system
echo "🔌 Checking plugin system..."
if [ -f "plugins/registry.json" ] && [ -d "plugins/warp" ]; then
    echo "✅ Plugin system operational"
else
    echo "❌ Plugin system incomplete"
    ISSUES_FOUND=$((ISSUES_FOUND + 1))
fi

# Check Git repository health
echo "📚 Checking Git repository..."
if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
    if git status --porcelain | grep -q .; then
        echo "⚠️ Uncommitted changes detected"
        git status --short
    else
        echo "✅ Git repository clean"
    fi
else
    echo "❌ Not in a Git repository"
    ISSUES_FOUND=$((ISSUES_FOUND + 1))
fi

# Check Python environment
echo "🐍 Checking Python environment..."
if python3 -c "import sqlite3, json, pathlib" 2>/dev/null; then
    echo "✅ Python environment ready"
else
    echo "❌ Python environment issues"
    ISSUES_FOUND=$((ISSUES_FOUND + 1))
fi

# Summary
echo ""
echo "📊 Health Check Summary"
echo "======================="
if [ $ISSUES_FOUND -eq 0 ]; then
    echo "✅ System is healthy!"
else
    echo "⚠️ Found $ISSUES_FOUND issues"
    echo "💡 Run 'mise run system:bootstrap' to resolve issues"
fi
"""

#===============================================================================
# HOOKS - Runtime Integration
#===============================================================================
[hooks]
[hooks.env_setup]
run = """#!/usr/bin/env bash
set -euo pipefail

# Initialize plugin system if not already done
if [ ! -d "plugins" ] && [ -f "mise.toml" ] && grep -q "unified.*automation" mise.toml; then
    echo "🔌 Initializing plugin system..."
    mkdir -p plugins
fi

# Load environment from .env if present
if [ -f ".env" ] && command -v dotenvx &>/dev/null; then
    dotenvx load || true
fi
"""

[hooks.post_task]
run = """#!/usr/bin/env bash
set -euo pipefail

# Log task execution for analytics
TASK_LOG="${XDG_STATE_HOME:-$HOME/.local/state}/unified_automation_task_history.log"
mkdir -p "$(dirname "$TASK_LOG")"

TIMESTAMP=$(date +"%Y-%m-%dT%H:%M:%S%z")
echo "${TIMESTAMP} | Task: ${MISE_TASK_ID:-unknown} | Exit: ${MISE_TASK_EXIT_CODE:-N/A} | Duration: ${MISE_TASK_RUN_TIME_MS:-N/A}ms" >> "$TASK_LOG"
"""
