# Trunk configuration for Unified Terminal Automation System
version: 0.1
cli:
  version: 1.22.2

plugins:
  sources:
    - id: trunk
      ref: v1.6.2
      uri: https://github.com/trunk-io/plugins

lint:
  enabled:
    - actionlint@1.7.1
    - bandit@1.7.5
    - black@24.4.2
    - checkov@3.2.252
    - eslint@8.57.0
    - flake8@7.1.1
    - git-diff-check
    - gitleaks@8.18.4
    - hadolint@2.12.0
    - isort@5.13.2
    - markdownlint@0.41.0
    - mypy@1.11.2
    - oxipng@9.1.2
    - prettier@3.3.3
    - pylint@3.2.7
    - ruff@0.6.4
    - shellcheck@0.10.0
    - shfmt@3.7.0
    - sqlfluff@3.1.1
    - taplo@0.9.3
    - terrascan@1.19.1
    - trivy@0.55.0
    - trufflehog@3.82.6
    - yamllint@1.35.1

actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available

runtimes:
  enabled:
    - go@1.21.0
    - node@18.12.1
    - python@3.10.8
