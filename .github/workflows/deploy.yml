name: Deploy Unified Terminal Automation System
'on':
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:
            - unified-terminal-automation:latest
            - unified-terminal-automation:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Kubernetes
        run: 'echo "Deploying to ${{ github.event.inputs.environment || ''staging'' }}"

          kubectl apply -f k8s/

          kubectl set image deployment/unified-automation app=unified-terminal-automation:${{ github.sha }}'
