version: '3.8'
services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VARIANT: ubuntu-22.04
    volumes:
      - ../..:/workspaces:cached
      - mise-cache:/home/vscode/.cache/mise
      - cargo-cache:/home/vscode/.cargo
      - uv-cache:/home/vscode/.cache/uv
      - bun-cache:/home/vscode/.cache/bun
      - node-modules:/workspace/node_modules
    environment:
      - DOCKER_BUILDKIT=1
      - MISE_EXPERIMENTAL=1
      - UV_SYSTEM_PYTHON=1
    command: sleep infinity
    networks:
      - warp-network
  # AI inference service (local)
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - warp-network
    profiles:
      - ai-local
  # Database services for development
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: warp_dev
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - warp-network
    profiles:
      - database
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - warp-network
    profiles:
      - cache
volumes:
  mise-cache:
  cargo-cache:
  uv-cache:
  bun-cache:
  node-modules:
  ollama-data:
  postgres-data:
  redis-data:
networks:
  warp-network:
    driver: bridge
