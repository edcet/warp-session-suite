[projects.scripts]

[tasks."schema:validate"]
description = "Validate extracted schema files"
run = '''
#!/bin/bash
set -euo pipefail

OUTPUT_DIR="docs/schema/raw"

echo "🔍 Validating schema files..."

# Check if files exist
for file in schema.sql schema.json schema.yaml; do
    if [[ -f "$OUTPUT_DIR/$file" ]]; then
        echo "✅ $file exists"
    else
        echo "❌ $file missing"
        exit 1
    fi
done

# Validate JSON
if command -v jq &> /dev/null; then
    if jq empty "$OUTPUT_DIR/schema.json" 2>/dev/null; then
        echo "✅ schema.json is valid JSON"
    else
        echo "❌ schema.json is invalid JSON"
        exit 1
    fi
else
    echo "⚠️  jq not found, skipping JSON validation"
fi

# Validate YAML
if command -v yq &> /dev/null; then
    if yq eval . "$OUTPUT_DIR/schema.yaml" > /dev/null 2>&1; then
        echo "✅ schema.yaml is valid YAML"
    else
        echo "❌ schema.yaml is invalid YAML"
        exit 1
    fi
else
    echo "⚠️  yq not found, skipping YAML validation"
fi

echo "✅ All schema files are valid!"
'''
